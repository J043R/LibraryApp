<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль пользователя</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
  <div>
    <h1>Профиль пользователя</h1>
    <p>Просмотр карточки пользователя по внутреннему номеру</p>
  </div>
  <div class="role-box">
    <span>Пользователь: <b id="currentUserText">не выполнен вход</b></span>
    <span>Доступ: <b id="currentRoleText">Гость</b></span>
    <button id="logoutBtn" class="secondary">Выйти</button>
  </div>
</header>
<nav class="nav">
  <a href="index.html">Вход</a>
  <a data-role="admin,librarian" href="users.html">Пользователи</a>
  <a data-role="admin,librarian,reader" href="books.html">Книги</a>
  <a class="active" data-role="admin,librarian,reader" href="profile.html">Профиль</a>
  <a data-role="admin" href="logs.html">Журнал</a>
</nav>
<main class="container">
  <section class="card">
    <h2>Поиск карточки</h2>
    <div class="form-grid">
      <input id="profileId" placeholder="ID пользователя" value="3">
      <button id="profileBtn">Показать</button>
    </div>
    <div id="profileResult" class="profile-empty">Введите ID и нажмите кнопку</div>
  </section>
</main>
<script src="js/auth.js"></script><script src="js/api.js"></script><script src="js/profile.js"></script>
</body>
</html>
